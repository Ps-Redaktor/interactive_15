<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 Signs of a Correct Apex · Checklist</title>
  <style>
    :root {
      --primary: #0b1e33;
      --secondary: #475569;
      --accent: #3b82f6;
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--primary);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .checklist-container {
      background: var(--card-bg);
      max-width: 600px;
      width: 100%;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 25px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--bg);
    }

    h1 {
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    /* Minimal Schematic */
    .visual-ref {
      width: 100%;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
      background: #fafbfc;
      border-radius: 12px;
    }

    .nail-icon {
      width: 120px;
      height: 30px;
      border-bottom: 3px solid var(--primary);
      position: relative;
      border-radius: 0 0 4px 4px;
    }

    .apex-curve {
      width: 100%;
      height: 20px;
      border: 2px solid var(--accent);
      border-bottom: none;
      border-radius: 60% 60% 0 0 / 100% 100% 0 0;
      position: absolute;
      bottom: 0;
    }

    /* Checklist Items */
    .checklist-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .checklist-item:last-child { border-bottom: none; }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      flex-shrink: 0;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checklist-item:hover .checkbox {
      border-color: var(--accent);
    }

    /* Logic for checking via CSS (optional visual only) */
    .checklist-item.active .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    .checklist-item.active .checkbox::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .text {
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--secondary);
    }

    .text strong { color: var(--primary); }

    /* Controls */
    .controls {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }

    .btn-download {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-download:hover { opacity: 0.9; }

    @media print {
      body { background: white; padding: 0; }
      .controls { display: none; }
      .checklist-container { box-shadow: none; border: none; padding: 0; width: 100%; }
      .checkbox { border: 1.5px solid #000; }
    }
  </style>
</head>
<body>

  <div class="checklist-container">
    <header>
      <h1>5 Signs of a Correct Apex</h1>
    </header>

    <div class="visual-ref">
      <div class="nail-icon">
        <div class="apex-curve"></div>
      </div>
    </div>

    <div id="list">
      <div class="checklist-item" onclick="this.classList.toggle('active')">
        <div class="checkbox"></div>
        <div class="text">Highest point is in the <strong>center</strong> (stress zone).</div>
      </div>

      <div class="checklist-item" onclick="this.classList.toggle('active')">
        <div class="checkbox"></div>
        <div class="text">Smooth descent toward the <strong>cuticle</strong> (no hump).</div>
      </div>

      <div class="checklist-item" onclick="this.classList.toggle('active')">
        <div class="checkbox"></div>
        <div class="text">Smooth descent toward the <strong>free edge</strong> (no dip).</div>
      </div>

      <div class="checklist-item" onclick="this.classList.toggle('active')">
        <div class="checkbox"></div>
        <div class="text">Strengthened <strong>side walls</strong> (front view).</div>
      </div>

      <div class="checklist-item" onclick="this.classList.toggle('active')">
        <div class="checkbox"></div>
        <div class="text">Absolutely <strong>smooth surface</strong> (no waves).</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-download" onclick="window.print()">Download (PDF)</button>
  </div>

</body>
